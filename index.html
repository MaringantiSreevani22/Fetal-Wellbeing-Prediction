<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetal Wellbeing Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('background.jpg'); /* Replace with your background image URL */
            background-size: cover;
            background-position: center;
            color: #333;
        }

        header {
            background-color: rgba(0, 123, 255, 0.8);
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            color: #007bff;
            font-size: 28px;
            margin: 20px 0;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .button {
            background-color: #007bff;
            color: #fff;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #0056b3;
        }

        .join-button-container {
            margin-top: 60px; /* Increased margin to move the button further down */
            text-align: center;
        }

        .join-button {
            padding: 15px 30px;
            background-color: #28a745;
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .join-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <header>
        <h1>Fetal Wellbeing Prediction</h1>
    </header>

    <div class="container">
        <p>Welcome to the Fetal Wellbeing Prediction Project, where we explore fetal development, pregnancy care, and community involvement. Join us to contribute to this innovative project.</p>
        
        <div class="button-container">
            <a href="{{ url_for('introduction') }}" class="button">Introduction</a>
            <a href="{{ url_for('fetal_development') }}" class="button">Fetal Development</a>
            <a href="{{ url_for('pregnancy_care') }}" class="button">Pregnancy Care</a>
        </div>
        
        <div class="join-button-container">
            <a href="{{ url_for('inspect') }}" class="join-button">Join Now</a>
        </div>
    </div>
</body>
</html>
